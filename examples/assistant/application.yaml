app:
  name: assistant-demo
  description: Example VForge application with two collaborating agents.

llm:
  provider: anthropic
  model: claude-opus-4-8
  api_key: ${ANTHROPIC_API_KEY}
  max_tokens: 16000

agents:
  - name: assistant
    description: General-purpose assistant; delegates research to the researcher.
    prompt: prompts/assistant.md
    skills:
      - house-style

  - name: researcher
    description: Focused research agent that produces structured findings.
    prompt: prompts/researcher.md

# Uncomment to give agents filesystem tools via MCP:
# mcp:
#   servers:
#     - name: fs
#       transport: stdio
#       command: npx
#       args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
#
# Then add under an agent:
#     mcp_servers: [fs]

server:
  host: 0.0.0.0
  port: 8000
  # Serve the Angular console instead of the built-in one:
  # 1) cd ../../webui/angular && npm install && npm run build
  # 2) uncomment:
  # ui_dir: ../../webui/angular/dist/vforge-console/browser

observability:
  log_level: INFO
  # OpenTelemetry tracing (requires: pip install "vforge[otel]"):
  # otel:
  #   enabled: true
  #   endpoint: http://localhost:4318   # OTLP/HTTP collector (Jaeger, Tempo, ...)
  #   console_export: false
